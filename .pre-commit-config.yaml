repos:
  # Gitleaks - Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.13
        args: ['--config', 'services/api/pyproject.toml']
        files: ^services/api/

  # Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--settings-path', 'services/api/pyproject.toml']
        files: ^services/api/

  # Python linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--config', 'services/api/setup.cfg', '--max-line-length=88', '--extend-ignore=E203,W503']
        files: ^services/api/

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ['--config-file', 'services/api/setup.cfg', '--ignore-missing-imports']
        files: ^services/api/festival_playlist_generator/
        additional_dependencies: [
          'types-redis',
          'types-requests',
          'types-python-dateutil',
          'sqlalchemy[mypy]',
          'pydantic',
          'pydantic-settings',
          'dependency-injector',
        ]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
