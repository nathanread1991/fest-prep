name: Deploy to Dev

on:
  push:
    branches:
      - main
    paths:
      - 'services/api/**'
      - 'infrastructure/terraform/**'
  workflow_dispatch:
    inputs:
      restore_from_snapshot:
        description: 'Restore database from latest snapshot'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: dev
  PROJECT_NAME: festival-playlist
  TF_WORKING_DIR: infrastructure/terraform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Run tests before deploying
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -m "not integration" -v

  # Deploy infrastructure (creates ECR repo, VPC, RDS, etc.)
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="database_restore_from_snapshot=${{ github.event.inputs.restore_from_snapshot || 'false' }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # TODO: The following jobs are disabled until the Docker image is built and pushed to ECR.
  # Re-enable build-push, deploy-app, smoke-test, and notify jobs when ready for Week 3 Task 23/24.
  # See tasks.md: Task 23 (Build and test Docker image) and Task 24 (Deploy application to ECS)
