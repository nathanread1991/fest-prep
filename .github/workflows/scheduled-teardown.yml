name: Scheduled Teardown

on:
  schedule:
    # 6 PM GMT weekdays (adjust for your timezone)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
      skip_snapshot:
        description: 'Skip database snapshot before teardown'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: infra-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  PROJECT_NAME: festival-playlist
  TF_WORKING_DIR: infrastructure/terraform
  SNAPSHOT_RETENTION_DAYS: 7
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    name: Create Database Snapshot
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_snapshot != 'true'
    outputs:
      snapshot_id: ${{ steps.snapshot.outputs.snapshot_id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find RDS cluster
        id: cluster
        run: |
          CLUSTER_ID=$(aws rds describe-db-clusters \
            --query "DBClusters[?starts_with(DBClusterIdentifier, '${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}')].DBClusterIdentifier | [0]" \
            --output text 2>/dev/null || echo "None")
          echo "cluster_id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          if [ "$CLUSTER_ID" = "None" ] || [ -z "$CLUSTER_ID" ]; then
            echo "No RDS cluster found — skipping snapshot"
          else
            echo "Found cluster: $CLUSTER_ID"
          fi

      - name: Create snapshot
        id: snapshot
        if: steps.cluster.outputs.cluster_id != 'None' && steps.cluster.outputs.cluster_id != ''
        run: |
          SNAPSHOT_ID="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-snapshot-$(date +%Y%m%d-%H%M%S)"
          aws rds create-db-cluster-snapshot \
            --db-cluster-identifier "${{ steps.cluster.outputs.cluster_id }}" \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID" \
            --tags Key=Project,Value=${{ env.PROJECT_NAME }} \
                   Key=Environment,Value=${{ env.ENVIRONMENT }} \
                   Key=ManagedBy,Value=github-actions
          echo "snapshot_id=${SNAPSHOT_ID}" >> "$GITHUB_OUTPUT"
          echo "Created snapshot: $SNAPSHOT_ID"

      - name: Wait for snapshot completion
        if: steps.snapshot.outputs.snapshot_id != ''
        run: |
          echo "Waiting for snapshot to become available..."
          aws rds wait db-cluster-snapshot-available \
            --db-cluster-snapshot-identifier "${{ steps.snapshot.outputs.snapshot_id }}"
          echo "✅ Snapshot ready: ${{ steps.snapshot.outputs.snapshot_id }}"

  teardown:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: snapshot
    if: always() && (needs.snapshot.result == 'success' || needs.snapshot.result == 'skipped')
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_profile=default" \
            -auto-approve

  cleanup:
    name: Cleanup Old Snapshots
    runs-on: ubuntu-latest
    needs: teardown
    if: always() && needs.teardown.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete snapshots older than retention period
        run: |
          CUTOFF=$(date -u -d "${{ env.SNAPSHOT_RETENTION_DAYS }} days ago" +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-${{ env.SNAPSHOT_RETENTION_DAYS }}d +%Y-%m-%dT%H:%M:%S)
          SNAPSHOTS=$(aws rds describe-db-cluster-snapshots \
            --query "DBClusterSnapshots[?starts_with(DBClusterSnapshotIdentifier, '${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-snapshot-') && SnapshotCreateTime < '${CUTOFF}'].DBClusterSnapshotIdentifier" \
            --output text 2>/dev/null || echo "")
          if [ -z "$SNAPSHOTS" ]; then
            echo "No old snapshots to clean up"
            exit 0
          fi
          for SNAP in $SNAPSHOTS; do
            echo "Deleting old snapshot: $SNAP"
            aws rds delete-db-cluster-snapshot \
              --db-cluster-snapshot-identifier "$SNAP" 2>/dev/null || true
          done

  verify:
    name: Verify Teardown
    runs-on: ubuntu-latest
    needs: teardown
    if: always() && needs.teardown.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify compute resources destroyed
        run: |
          echo "Checking ECS clusters..."
          ECS=$(aws ecs list-clusters \
            --query "clusterArns[?contains(@, '${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}')]" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ECS" ]; then
            echo "⚠️ ECS clusters still exist: $ECS"
          else
            echo "✅ ECS clusters destroyed"
          fi

          echo "Checking RDS clusters..."
          RDS=$(aws rds describe-db-clusters \
            --query "DBClusters[?starts_with(DBClusterIdentifier, '${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}')].DBClusterIdentifier" \
            --output text 2>/dev/null || echo "")
          if [ -n "$RDS" ]; then
            echo "⚠️ RDS clusters still exist: $RDS"
          else
            echo "✅ RDS clusters destroyed"
          fi

          echo "Checking load balancers..."
          ALB=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName, '${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}')].LoadBalancerName" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ALB" ]; then
            echo "⚠️ Load balancers still exist: $ALB"
          else
            echo "✅ Load balancers destroyed"
          fi

  notify:
    name: Teardown Notification
    runs-on: ubuntu-latest
    needs: [snapshot, teardown, verify]
    if: always()
    steps:
      - name: Teardown status
        run: |
          if [ "${{ needs.teardown.result }}" == "success" ]; then
            echo "✅ Teardown complete for ${{ env.ENVIRONMENT }}"
            echo "   Snapshot: ${{ needs.snapshot.outputs.snapshot_id || 'skipped' }}"
            echo "   Persistent resources (S3, Secrets Manager) remain intact"
          else
            echo "❌ Teardown failed for ${{ env.ENVIRONMENT }}"
            exit 1
          fi
