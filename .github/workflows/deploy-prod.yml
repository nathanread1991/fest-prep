name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy-prod" to confirm'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: prod
  PROJECT_NAME: festival-playlist
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm_deploy != 'deploy-prod'
        run: |
          echo "You must type 'deploy-prod' to confirm."
          exit 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS API service
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster" \
            --service "${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api" \
            --force-new-deployment

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster" \
            --services "${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api"

  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Test health endpoint
        run: |
          MAX_RETRIES=12
          RETRY=0
          until curl -sf "https://api.gig-prep.co.uk/health" || [ $RETRY -eq $MAX_RETRIES ]; do
            sleep 15
            RETRY=$((RETRY+1))
          done
          [ $RETRY -lt $MAX_RETRIES ] || exit 1

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback ECS service
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api"
          PREV_TD=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments[?status==`ACTIVE`].taskDefinition | [0]' \
            --output text 2>/dev/null || echo "")
          if [ -n "$PREV_TD" ] && [ "$PREV_TD" != "None" ]; then
            aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --task-definition "$PREV_TD"
          fi
