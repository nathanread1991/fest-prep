name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
        type: string
      restore_from_snapshot:
        description: 'Restore database from latest snapshot'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: prod
  PROJECT_NAME: festival-playlist
  TF_WORKING_DIR: infrastructure/terraform

jobs:
  # Validate confirmation
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm_deploy != 'deploy-prod'
        run: |
          echo "❌ Deployment not confirmed. You must type 'deploy-prod' to proceed."
          exit 1

      - name: Confirm deployment
        run: echo "✅ Production deployment confirmed"

  # Run full test suite
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # Build and push Docker image
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPO="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-app"
          IMAGE_TAG="${{ github.sha }}"
          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "repository=${ECR_REPO}" >> "$GITHUB_OUTPUT"
          echo "tags=${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Terraform plan for review
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-push
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        run: terraform init

      - name: Select prod workspace
        run: terraform workspace select prod || terraform workspace new prod

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_profile=default" \
            -var="environment=prod" \
            -var="database_restore_from_snapshot=${{ github.event.inputs.restore_from_snapshot }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # Apply infrastructure
  deploy-infra:
    name: Apply Infrastructure
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform Init
        run: terraform init

      - name: Select prod workspace
        run: terraform workspace select prod

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # Deploy application to ECS
  deploy-app:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [build-push, deploy-infra]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS API service
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Update ECS Worker service
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-worker"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}" || true

      - name: Wait for API service stability
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "${{ env.AWS_REGION }}"

  # Smoke tests
  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-app
    steps:
      - name: Test health endpoint
        run: |
          MAX_RETRIES=12
          RETRY=0
          HEALTH_URL="https://api.gig-prep.co.uk/health"
          until curl -sf "$HEALTH_URL" || [ $RETRY -eq $MAX_RETRIES ]; do
            echo "Waiting for health check... (attempt $((RETRY+1))/$MAX_RETRIES)"
            sleep 15
            RETRY=$((RETRY+1))
          done
          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ Production health check failed"
            exit 1
          fi
          echo "✅ Production health check passed"

  # Rollback on failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback ECS API service
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster"
          SERVICE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api"
          echo "⚠️ Rolling back ECS service to previous task definition..."
          PREV_TD=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].deployments[?status==`ACTIVE`].taskDefinition | [0]' \
            --output text 2>/dev/null || echo "")
          if [ -n "$PREV_TD" ] && [ "$PREV_TD" != "None" ]; then
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$PREV_TD" \
              --region "${{ env.AWS_REGION }}"
            echo "✅ Rollback initiated to: $PREV_TD"
          else
            echo "⚠️ No previous task definition found for rollback"
          fi

  # Notification
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✅ Production deployment successful (commit: ${{ github.sha }})"
          else
            echo "❌ Production deployment failed - rollback initiated (commit: ${{ github.sha }})"
            exit 1
          fi
