name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'test/**'
      - 'feature/**'
    paths:
      - 'services/api/**'
      - '.github/workflows/pr.yml'
      - 'infrastructure/terraform/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'services/api/**'
      - '.github/workflows/pr.yml'
      - 'infrastructure/terraform/**'

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality - Linting and Formatting
  lint:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: Run Black (code formatting check)
        id: black-check
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Auto-format with Black if needed
        if: steps.black-check.outcome == 'failure'
        run: |
          black .

      - name: Commit formatting changes
        if: steps.black-check.outcome == 'failure'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "style: auto-format code with black [skip ci]"

      - name: Push formatting changes
        if: steps.black-check.outcome == 'failure'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff .
        continue-on-error: false

      - name: Run flake8 (linting)
        run: |
          flake8 festival_playlist_generator/ tests/ \
            --config=setup.cfg \
            --max-line-length=88 \
            --extend-ignore=E203,W503 \
            --count \
            --show-source \
            --statistics
        continue-on-error: false

  # Job 2: Type Checking
  type-check:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-redis types-requests

      - name: Run mypy (strict mode)
        run: |
          mypy festival_playlist_generator/ \
            --config-file=setup.cfg \
            --show-error-codes \
            --pretty
        continue-on-error: false

  # Job 3: Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security linter)
        run: |
          bandit -r festival_playlist_generator -f json -o bandit-report.json || true
          bandit -r festival_playlist_generator -ll
        continue-on-error: false

      - name: Run Safety (dependency vulnerability scan)
        run: |
          pip install -r requirements.txt
          safety scan --output json --save-as safety-report.json || true
          safety scan
        continue-on-error: true  # Don't fail on safety warnings for now

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: services/api/bandit-report.json
          retention-days: 30

  # Job 4: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -m "not integration" \
            --cov=festival_playlist_generator \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/api/coverage.xml
            services/api/htmlcov/
          retention-days: 30

  # Job 5: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Install Redis CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U test_user; do
            sleep 1
          done
          echo "PostgreSQL is ready!"

          echo "Waiting for Redis..."
          until redis-cli -h localhost -p 6379 ping; do
            sleep 1
          done
          echo "Redis is ready!"

      - name: Run integration tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          # Run integration tests if they exist
          # Exit code 5 means no tests collected, which is OK during refactoring
          pytest tests/ -m integration \
            --cov=festival_playlist_generator \
            --cov-report=xml \
            --cov-report=term \
            -v || EXIT_CODE=$?

          if [ "${EXIT_CODE:-0}" -eq 5 ]; then
            echo "No integration tests found - this is expected during refactoring"
            exit 0
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "Integration tests failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-reports
          path: services/api/coverage.xml
          retention-days: 30

  # Job 6: Upload Coverage to Codecov
  upload-coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-reports

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-reports/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check combined coverage threshold
        run: |
          echo "Coverage threshold check skipped - refactoring in progress"
          # Note: Coverage thresholds will be enforced after refactoring is complete

  # Job 7: Docker Build and Validation
  docker-build:
    name: Docker Build & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < services/api/Dockerfile || true

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          file: services/api/Dockerfile
          push: false
          tags: festival-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          # Run the container in detached mode
          docker run -d --name test-container \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -e REDIS_URL=redis://localhost:6379 \
            -p 8000:8000 \
            festival-api:${{ github.sha }} \
            sleep 30

          # Wait a moment for container to start
          sleep 5

          # Check if container is running
          docker ps | grep test-container

          # Clean up
          docker stop test-container
          docker rm test-container

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: festival-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail on vulnerabilities for now

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 30

  # Summary job to check all quality gates
  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, security, unit-tests, integration-tests, docker-build]
    if: always()

    steps:
      - name: Check quality gate status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Linting failed"
            exit 1
          fi
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ Type checking failed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Security scanning failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All quality gates passed!"
