[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_calls = False
ignore_missing_imports = True
no_implicit_optional = True
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = False
warn_unreachable = False
strict_optional = False
strict_equality = False
show_error_codes = True
pretty = True

# Allow untyped definitions
allow_untyped_globals = True
allow_redefinition = True
allow_untyped_decorators = True

# Disable specific error codes that are too noisy
disable_error_code = assignment,attr-defined,name-defined,arg-type,return-value,operator,call-overload,index,var-annotated,valid-type,dict-item

[mypy-alembic.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-*.migrations.*]
ignore_errors = True
