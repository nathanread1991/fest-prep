[mypy]
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = True
strict_equality = True
show_error_codes = True
pretty = True
ignore_missing_imports = True

[mypy-alembic.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-*.migrations.*]
ignore_errors = True

[mypy-festival_playlist_generator.api.endpoints.*]
disallow_untyped_decorators = False

[mypy-festival_playlist_generator.web.*]
disallow_untyped_decorators = False

[mypy-festival_playlist_generator.tasks.*]
disallow_untyped_decorators = False

[mypy-festival_playlist_generator.core.config]
disallow_any_generics = False

[mypy-festival_playlist_generator.core.container]
disallow_any_generics = False

[mypy-festival_playlist_generator.core.celery_app]
disallow_untyped_decorators = False

[flake8]
max-line-length = 88
extend-ignore = E203, W503
per-file-ignores =
    __init__.py:F401
exclude =
    .git,
    __pycache__,
    .mypy_cache,
    .pytest_cache,
    venv,
    migrations,
    alembic
