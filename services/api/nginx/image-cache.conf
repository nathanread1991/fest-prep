# nginx Image Caching Configuration
# Caches external images (Spotify CDN, festival logos) locally for improved performance

# Define cache path and settings
proxy_cache_path /var/cache/nginx/images 
    levels=1:2 
    keys_zone=image_cache:100m 
    max_size=5g 
    inactive=30d 
    use_temp_path=off;

# Rate limiting zones
# Higher limit to allow cache warming (237 images)
limit_req_zone $binary_remote_addr zone=image_limit:10m rate=500r/m;

# Upstream for the main FastAPI application
upstream fastapi_app {
    server app:8000;
}

server {
    listen 8080;
    server_name localhost;

    # Increase buffer sizes for image handling
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Image proxy endpoint with caching (public, rate limited)
    location /images/proxy {
        # DNS resolver for external domains
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;
        
        # Apply rate limiting for public access
        limit_req zone=image_limit burst=250 nodelay;
        limit_req_status 429;

        # Extract URL from query parameter
        set $image_url $arg_url;

        # Validate that URL parameter exists
        if ($image_url = "") {
            return 400 "URL parameter required";
        }

        # Domain whitelist - only allow trusted CDNs
        set $valid_domain 0;
        
        # Check if URL contains trusted domains
        if ($image_url ~* "^https?://(i\.scdn\.co|mosaic\.scdn\.co|lineup-images\.scdn\.co|image-cdn-ak\.spotifycdn\.com|image-cdn-fa\.spotifycdn\.com)") {
            set $valid_domain 1;
        }

        # Reject untrusted domains
        if ($valid_domain = 0) {
            return 403 "Domain not whitelisted";
        }

        # Proxy to external image URL
        proxy_pass $image_url;
        
        # Cache configuration
        proxy_cache image_cache;
        proxy_cache_key "$image_url";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        # Headers for external request
        proxy_set_header User-Agent "FestivalPlaylistGenerator/1.0";
        proxy_set_header Accept "*/*";
        
        # Remove headers that might cause issues
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        
        # Response headers
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        
        # Hide upstream headers
        proxy_hide_header Set-Cookie;
        proxy_hide_header X-Powered-By;
        proxy_ignore_headers Set-Cookie;

        # File size limit (10MB)
        client_max_body_size 10m;

        # Error handling - return 502 on upstream errors
        proxy_intercept_errors off;
    }

    # Internal image proxy endpoint (no rate limiting, for cache warming)
    location /images/internal-proxy {
        # Only allow access from internal Docker network
        allow 172.16.0.0/12;  # Docker default bridge network range
        deny all;
        
        # DNS resolver for external domains
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;
        
        # NO rate limiting for internal requests

        # Extract URL from query parameter
        set $image_url $arg_url;

        # Validate that URL parameter exists
        if ($image_url = "") {
            return 400 "URL parameter required";
        }

        # Domain whitelist - only allow trusted CDNs
        set $valid_domain 0;
        
        # Check if URL contains trusted domains
        if ($image_url ~* "^https?://(i\.scdn\.co|mosaic\.scdn\.co|lineup-images\.scdn\.co|image-cdn-ak\.spotifycdn\.com|image-cdn-fa\.spotifycdn\.com)") {
            set $valid_domain 1;
        }

        # Reject untrusted domains
        if ($valid_domain = 0) {
            return 403 "Domain not whitelisted";
        }

        # Proxy to external image URL
        proxy_pass $image_url;
        
        # Cache configuration (same cache as public endpoint)
        proxy_cache image_cache;
        proxy_cache_key "$image_url";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        # Headers for external request
        proxy_set_header User-Agent "FestivalPlaylistGenerator/1.0";
        proxy_set_header Accept "*/*";
        
        # Remove headers that might cause issues
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        
        # Response headers
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        
        # Hide upstream headers
        proxy_hide_header Set-Cookie;
        proxy_hide_header X-Powered-By;
        proxy_ignore_headers Set-Cookie;

        # File size limit (10MB)
        client_max_body_size 10m;

        # Error handling - return 502 on upstream errors
        proxy_intercept_errors off;
    }

    # Reverse proxy for main FastAPI application
    location / {
        proxy_pass https://fastapi_app;
        proxy_ssl_verify off;  # Disable SSL verification for self-signed cert
        
        # Preserve original request information
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;  # Force HTTP scheme
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        
        # Handle redirects - rewrite HTTPS to HTTP
        proxy_redirect https:// http://;
        proxy_redirect https://$host/ http://$host/;
        proxy_redirect https://$host:8000/ http://$host/;
        
        # Timeouts for app requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
