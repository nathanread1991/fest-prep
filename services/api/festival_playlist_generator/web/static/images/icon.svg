<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Music note -->
  <g fill="white">
    <!-- Note stem -->
    <rect x="200" y="120" width="8" height="200" rx="4"/>
    
    <!-- Note head -->
    <ellipse cx="180" cy="320" rx="25" ry="18" transform="rotate(-20 180 320)"/>
    
    <!-- Musical staff lines -->
    <rect x="120" y="180" width="280" height="2" opacity="0.6"/>
    <rect x="120" y="200" width="280" height="2" opacity="0.6"/>
    <rect x="120" y="220" width="280" height="2" opacity="0.6"/>
    <rect x="120" y="240" width="280" height="2" opacity="0.6"/>
    <rect x="120" y="260" width="280" height="2" opacity="0.6"/>
    
    <!-- Festival tent -->
    <path d="M300 280 L380 280 L360 240 L320 240 Z" opacity="0.8"/>
    <rect x="335" y="280" width="10" height="40" opacity="0.8"/>
    
    <!-- Playlist lines -->
    <rect x="250" y="350" width="120" height="3" rx="1.5" opacity="0.7"/>
    <rect x="250" y="365" width="100" height="3" rx="1.5" opacity="0.7"/>
    <rect x="250" y="380" width="140" height="3" rx="1.5" opacity="0.7"/>
    <rect x="250" y="395" width="80" height="3" rx="1.5" opacity="0.7"/>
  </g>
</svg>